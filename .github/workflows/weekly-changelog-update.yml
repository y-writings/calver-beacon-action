name: weekly-changelog-update

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:
    inputs:
      calver_date:
        description: Optional override in YYYY.MM.DD format for manual recovery.
        required: false
        type: string

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: weekly-changelog-update-main
  cancel-in-progress: false

jobs:
  update-changelog:
    name: Update weekly changelog and enable auto-merge
    runs-on: ubuntu-latest
    steps:
      - name: Create pull request creator GitHub App token
        id: pr-creator-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2
        with:
          app-id: ${{ vars.PULL_REQUEST_CREATOR_APP_ID }}
          private-key: ${{ secrets.PULL_REQUEST_CREATOR_APP_PRIVATE_KEY }}

      - name: Check out repository for local action and changelog generation
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          fetch-depth: 0
          fetch-tags: true
          token: ${{ steps.pr-creator-token.outputs.token }}

      - name: Create weekly CalVer tag through GitHub API
        id: calver-tag
        uses: ./
        with:
          calver_date: ${{ inputs.calver_date }}
          target_ref: main
          github_token: ${{ steps.pr-creator-token.outputs.token }}

      - name: Prepare git-cliff inputs
        id: cliff-range
        if: ${{ steps.calver-tag.outputs.created == 'true' }}
        env:
          TAG: ${{ steps.calver-tag.outputs.tag }}
          PREVIOUS_TAG: ${{ steps.calver-tag.outputs.previous_tag }}
        run: |
          git fetch --force origin "refs/tags/${TAG}:refs/tags/${TAG}"

          if [ -n "${PREVIOUS_TAG}" ]; then
            echo "range=${PREVIOUS_TAG}..${TAG}" >> "${GITHUB_OUTPUT}"
          else
            echo "range=${TAG}" >> "${GITHUB_OUTPUT}"
          fi

      - name: Generate CHANGELOG.md from release tag range
        if: ${{ steps.calver-tag.outputs.created == 'true' }}
        uses: orhun/git-cliff-action@c93ef52f3d0ddcdcc9bd5447d98d458a11cd4f72 # v4.7.1
        with:
          config: cliff.toml
          args: --verbose --tag ${{ steps.calver-tag.outputs.tag }} --output CHANGELOG.md ${{ steps.cliff-range.outputs.range }}
          github_token: ${{ steps.pr-creator-token.outputs.token }}

      - name: Create or update changelog pull request
        id: changelog-pull-request
        if: ${{ steps.calver-tag.outputs.created == 'true' }}
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          token: ${{ steps.pr-creator-token.outputs.token }}
          add-paths: |
            CHANGELOG.md
          author: github-actions[bot] <github-actions[bot]@users.noreply.github.com>
          committer: github-actions[bot] <github-actions[bot]@users.noreply.github.com>
          branch: automation/update-changelog
          base: main
          commit-message: "docs(changelog): update changelog"
          delete-branch: true
          title: "docs(changelog): update changelog"
          body: |
            ## Summary
            - regenerate `CHANGELOG.md` from `${{ steps.cliff-range.outputs.range }}`
            - generated after `${{ steps.calver-tag.outputs.tag }}` was created on `main`
            - auto-merge is enabled after automated validation

      - name: Validate changelog approver app
        if: ${{ steps.changelog-pull-request.outputs.pull-request-number != '' }}
        env:
          PULL_REQUEST_CREATOR_APP_ID: ${{ vars.PULL_REQUEST_CREATOR_APP_ID }}
          CHANGELOG_APPROVER_APP_ID: ${{ vars.CHANGELOG_APPROVER_APP_ID }}
        run: |
          if [ -n "${PULL_REQUEST_CREATOR_APP_ID}" ] && \
            [ -n "${CHANGELOG_APPROVER_APP_ID}" ] && \
            [ "${PULL_REQUEST_CREATOR_APP_ID}" = "${CHANGELOG_APPROVER_APP_ID}" ]; then
            echo "CHANGELOG_APPROVER_APP_ID must be different from PULL_REQUEST_CREATOR_APP_ID" >&2
            exit 1
          fi

      - name: Create changelog approver GitHub App token
        id: approver-token
        if: ${{ steps.changelog-pull-request.outputs.pull-request-number != '' }}
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2
        with:
          app-id: ${{ vars.CHANGELOG_APPROVER_APP_ID }}
          private-key: ${{ secrets.CHANGELOG_APPROVER_APP_PRIVATE_KEY }}

      - name: Verify changelog pull request changes
        id: verify-changes
        if: ${{ steps.changelog-pull-request.outputs.pull-request-number != '' }}
        env:
          GH_TOKEN: ${{ steps.pr-creator-token.outputs.token }}
          PR_NUMBER: ${{ steps.changelog-pull-request.outputs.pull-request-number }}
          REPOSITORY: ${{ github.repository }}
          EXPECTED_AUTHOR: app/y-writings-pr-creator-bot
        run: |
          pr_view="$(gh pr view "${PR_NUMBER}" --repo "${REPOSITORY}" --json author,files,headRefOid,id --jq '.id, .headRefOid, .author.login, (.files[].path)')"
          mapfile -t pr_lines <<< "${pr_view}"

          pull_request_id="${pr_lines[0]:-}"
          head_sha="${pr_lines[1]:-}"
          author="${pr_lines[2]:-}"
          files=("${pr_lines[@]:3}")

          printf '%s\n' "${files[@]}"

          if [ "${author}" != "${EXPECTED_AUTHOR}" ]; then
            echo "Refusing to auto-merge because the PR author is ${author}, expected ${EXPECTED_AUTHOR}" >&2
            exit 1
          fi

          if [ "${#files[@]}" -ne 1 ] || [ "${files[0]:-}" != "CHANGELOG.md" ]; then
            echo "Refusing to auto-merge because the PR changes files other than CHANGELOG.md" >&2
            exit 1
          fi

          if [ -z "${head_sha}" ]; then
            echo "Failed to resolve pull request head SHA" >&2
            exit 1
          fi

          if [ -z "${pull_request_id}" ]; then
            echo "Failed to resolve pull request node ID" >&2
            exit 1
          fi

          echo "pull_request_id=${pull_request_id}" >> "${GITHUB_OUTPUT}"
          echo "head_sha=${head_sha}" >> "${GITHUB_OUTPUT}"

      - name: Approve changelog pull request
        if: ${{ steps.changelog-pull-request.outputs.pull-request-number != '' }}
        env:
          GH_TOKEN: ${{ steps.approver-token.outputs.token }}
          PULL_REQUEST_ID: ${{ steps.verify-changes.outputs.pull_request_id }}
          HEAD_SHA: ${{ steps.verify-changes.outputs.head_sha }}
        run: |
          gh api graphql \
            -f pullRequestId="${PULL_REQUEST_ID}" \
            -f commitOID="${HEAD_SHA}" \
            -f body="Automated approval for CHANGELOG.md-only release PR." \
            -f query='mutation($pullRequestId: ID!, $commitOID: GitObjectID!, $body: String!) { addPullRequestReview(input: { pullRequestId: $pullRequestId, commitOID: $commitOID, event: APPROVE, body: $body }) { pullRequestReview { id } } }'

      - name: Enable auto-merge
        if: ${{ steps.changelog-pull-request.outputs.pull-request-number != '' }}
        env:
          GH_TOKEN: ${{ steps.pr-creator-token.outputs.token }}
          PR_NUMBER: ${{ steps.changelog-pull-request.outputs.pull-request-number }}
          REPOSITORY: ${{ github.repository }}
          HEAD_SHA: ${{ steps.verify-changes.outputs.head_sha }}
        run: |
          gh pr merge "${PR_NUMBER}" \
            --repo "${REPOSITORY}" \
            --squash \
            --auto \
            --delete-branch \
            --match-head-commit "${HEAD_SHA}"
